<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        :root {
            --body-bg: #0f1117;
            --card-bg: #1a1d29;
            --card-bg-hover: #222533;
            --text-primary: #ffffff;
            --text-secondary: #a7b0c4;
            --text-muted: #6b7280;
            --border-color: #2d3142;
            --accent-red: #dc2626;
            --accent-red-light: #ef4444;
        }
        html[data-theme="light"] {
            --body-bg: #f8fafc;
            --card-bg: #ffffff;
            --card-bg-hover: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
        }
        body {
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            padding-bottom: 40px;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
        }
        .toast.success {
            background: #10b981;
            color: white;
        }
        .toast.error {
            background: #ef4444;
            color: white;
        }
        .toast.info {
            background: #3b82f6;
            color: white;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .theme-toggle:hover {
            border-color: var(--accent-red);
            transform: scale(1.05);
        }
        .header {
            height: 70px;
            background: var(--body-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-left {
            display: flex;
            gap: 12px;
        }
        .back-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .back-btn:hover {
            background: var(--card-bg-hover);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .title {
            font-size: 28px;
            margin-bottom: 32px;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(220, 38, 38, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 16px;
            color: var(--accent-red);
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }
        .item:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 600;
            color: var(--text-primary);
        }
        .value {
            color: var(--text-secondary);
        }
        .item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge.bind {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .badge.unbind {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--accent-red-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--card-bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--border-color);
            box-shadow: none;
        }
        input[type="password"],
        input[type="text"] {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: var(--card-bg);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: var(--card-bg-hover);
            color: var(--text-primary);
        }
        .modal-body {
            padding: 24px;
        }
        .report-section {
            margin-bottom: 24px;
        }
        .report-section h4 {
            font-size: 14px;
            color: var(--accent-red);
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .report-item {
            padding: 12px 16px;
            background: var(--card-bg-hover);
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .report-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }
        .report-date {
            text-align: center;
            padding: 12px;
            background: rgba(220, 38, 38, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            color: var(--accent-red);
            font-weight: 600;
        }

        /* ==================== 响应式设计 ==================== */

        /* 平板尺寸 */
        @media (max-width: 992px) {
            .container {
                padding: 0 20px;
                margin: 30px auto;
            }
            
            .title {
                font-size: 24px;
            }
            
            .card {
                padding: 20px;
            }
        }

        /* 手机尺寸 */
        @media (max-width: 768px) {
            body {
                padding-bottom: 24px;
            }
            
            .theme-toggle {
                top: 12px;
                right: 12px;
                width: 40px;
                height: 40px;
                font-size: 16px;
                border-radius: 10px;
            }
            
            .header {
                padding: 0 16px;
                height: 60px;
            }
            
            .back-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .header-title {
                font-size: 17px;
            }
            
            .container {
                padding: 0 14px;
                margin: 24px auto;
            }
            
            .title {
                font-size: 22px;
                margin-bottom: 24px;
            }
            
            .card {
                padding: 18px 16px;
                border-radius: 12px;
            }
            
            .card h3 {
                font-size: 16px;
                margin-bottom: 16px;
            }
            
            .item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .label {
                font-size: 14px;
            }
            
            .item-right {
                width: 100%;
            }
            
            .item-right input {
                width: 100%;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            
            .report-item {
                padding: 10px 14px;
            }
            
            .report-label {
                font-size: 13px;
            }
            
            .report-value {
                font-size: 13px;
            }
            
            .modal {
                padding: 10px;
            }
            
            .modal-content {
                max-width: 100%;
                padding: 20px;
            }
            
            .modal-content h2 {
                font-size: 18px;
            }
            
            .close-btn {
                font-size: 24px;
                width: 36px;
                height: 36px;
            }
        }

        /* 小屏幕手机 */
        @media (max-width: 480px) {
            .header {
                padding: 0 12px;
            }
            
            .theme-toggle {
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
            }
            
            .header-title {
                display: none;
            }
            
            .container {
                padding: 0 12px;
            }
            
            .title {
                font-size: 20px;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
        </div>
        <div class="header-title">个人主页</div>
        <div style="width: 100px;"></div>
    </div>

    <div class="container">
        <div class="title">个人信息中心</div>

        <div class="card">
            <h3><i class="fas fa-user"></i> 账号信息</h3>
            <div class="item">
                <div class="label">用户名</div>
                <div class="value" id="usernameDisplay">用户</div>
            </div>
            <div class="item">
                <div class="label">密码</div>
                <div class="item-right">
                    <input type="password" value="******" readonly>
                    <button class="btn">修改</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-file-medical"></i> 体检报告</h3>
            <div class="item">
                <div class="label">上传体检报告</div>
                <div class="item-right">
                    <input type="file" id="reportFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none;" onchange="handleFileUpload(event)">
                    <button class="btn" onclick="document.getElementById('reportFile').click()">
                        <i class="fas fa-upload"></i>
                        选择文件
                    </button>
                </div>
            </div>
            <div class="item">
                <div class="label">最新报告</div>
                <button class="btn" onclick="viewLatestReport()">
                    <i class="fas fa-eye"></i>
                    查看报告
                </button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-watch"></i> 设备绑定</h3>
            <div class="item">
                <div class="label">电子手环/手表</div>
                <span class="badge bind">已绑定</span>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-phone"></i> 紧急联系人</h3>
            <div class="item">
                <div class="label">联系人状态</div>
                <div class="item-right">
                    <span class="badge unbind">未添加</span>
                    <button class="btn">
                        <i class="fas fa-plus"></i>
                        添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="reportModal" onclick="closeReportModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2><i class="fas fa-file-medical"></i> 体检报告详情</h2>
                <button class="modal-close" onclick="closeReportModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="reportModalBody">
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let isUploading = false;

        function initTheme() {
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = saved === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            let current = html.getAttribute('data-theme');
            let next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            icon.className = next === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function handleFileUpload(event) {
            if (isUploading) return;
            
            const file = event.target.files[0];
            if (!file) return;
            
            const username = getCurrentUser();
            if (!username) {
                showToast('请先登录', 'error');
                window.location.href = 'login.html';
                return;
            }
            
            isUploading = true;
            const btn = event.target.closest('.card').querySelectorAll('.btn')[0];
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传中...';
            btn.disabled = true;
            
            try {
                console.log('开始上传文件...');
                const result = await uploadMedicalReport(file);
                console.log('上传接口响应:', result);
                
                if (result.code === 200 && result.data) {
                    showToast('上传成功！', 'success');
                    
                    // 灵活处理数据格式
                    let medicalData = null;
                    if (result.data.medical_data) {
                        medicalData = result.data.medical_data;
                    } else {
                        // 如果没有medical_data包装，直接用data
                        medicalData = result.data;
                    }
                    
                    console.log('准备保存的数据:', medicalData);
                    
                    if (medicalData) {
                        await saveMedicalReport(username, medicalData);
                        showToast('报告已保存！', 'success');
                    }
                } else {
                    showToast(result.message || '上传失败', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast(error.message || '上传失败', 'error');
            } finally {
                isUploading = false;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function viewLatestReport() {
            const username = getCurrentUser();
            if (!username) {
                showToast('请先登录', 'error');
                window.location.href = 'login.html';
                return;
            }

            try {
                const result = await getLatestMedicalReport(username);
                
                if (result.code === 200 && result.data) {
                    renderReportModal(result.data);
                } else {
                    showToast(result.message || '暂无体检报告', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast(error.message || '获取报告失败', 'error');
            }
        }

        function renderReportModal(data) {
            const modalBody = document.getElementById('reportModalBody');
            let html = '';

            html += `
                <div class="report-date">
                    <i class="fas fa-clock"></i>
                    ${formatDate(data.created_at)}
                </div>
            `;

            if (data.report_data) {
                html += '<div class="report-section">';
                html += '<h4><i class="fas fa-clipboard-list"></i> 体检数据</h4>';
                
                const reportData = data.report_data;
                for (const [key, value] of Object.entries(reportData)) {
                    if (value !== null && value !== undefined && value !== '') {
                        const label = formatFieldName(key);
                        html += `
                            <div class="report-item">
                                <span class="report-label">${label}</span>
                                <span class="report-value">${value}</span>
                            </div>
                        `;
                    }
                }
                html += '</div>';
            }

            modalBody.innerHTML = html;
            document.getElementById('reportModal').classList.add('show');
        }

                '风险等级': '风险等级',
                '高概率疾病': '高概率疾病',
                '病情依据': '病情依据',
                '建议': '建议'
            };
            return nameMap[key] || key;
        }

        function closeReportModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('reportModal').classList.remove('show');
        }

        window.onload = function() {
            initTheme();
            updateUserDisplay();
            
            const username = getCurrentUser();
            if (username) {
                document.getElementById('usernameDisplay').textContent = username;
            }
        };
    </script>
</body>
</html>
