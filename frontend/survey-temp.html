<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心脏过劳风险评估问卷</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
}
:root {
    --body-bg: #0f1117;
    --card-bg: #1a1d29;
    --card-bg-hover: #222533;
    --text-primary: #ffffff;
    --text-secondary: #a7b0c4;
    --text-muted: #6b7280;
    --border-color: #2d3142;
    --accent-red: #dc2626;
    --accent-red-light: #ef4444;
}
html[data-theme="light"] {
    --body-bg: #f8fafc;
    --card-bg: #ffffff;
    --card-bg-hover: #f1f5f9;
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border-color: #e2e8f0;
    --accent-red: #dc2626;
    --accent-red-light: #ef4444;
}
body {
    background-color: var(--body-bg);
    color: var(--text-primary);
    padding: 24px;
    font-size: 16px;
    line-height: 1.6;
    transition: all 0.3s ease;
}
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--card-bg);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
.theme-toggle:hover {
    background: var(--card-bg-hover);
    transform: translateY(-2px);
}
.header {
    max-width: 900px;
    margin: 0 auto 24px;
}
.back-home {
    display: inline-block;
}
.back-home button {
    background: var(--card-bg);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
}
.back-home button:hover {
    background: var(--card-bg-hover);
}
.survey-wrapper {
    max-width: 900px;
    margin: 0 auto;
}
.survey-container {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    border: 1px solid var(--border-color);
}
.survey-title {
    font-size: 32px;
    text-align: center;
    margin-bottom: 12px;
    color: var(--text-primary);
    font-weight: 800;
    letter-spacing: -0.5px;
}
.survey-desc {
    text-align: center;
    color: var(--text-secondary);
    margin-bottom: 48px;
    font-size: 15px;
    line-height: 1.8;
}
.section {
    margin-bottom: 56px;
}
.section-title {
    font-size: 20px;
    font-weight: 800;
    text-align: center;
    color: var(--accent-red);
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border-color);
    display: block;
    letter-spacing: 0.5px;
}
.question {
    margin-bottom: 40px;
}
.q-title {
    font-size: 17px;
    font-weight: 700;
    text-align: left;
    color: var(--text-primary);
    margin-bottom: 20px;
    display: block;
    line-height: 1.6;
}
.q-mark {
    color: var(--accent-red);
    font-weight: bold;
    font-size: 14px;
    margin-left: 6px;
}
.options {
    display: flex;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
}
.option {
    display: inline-flex;
    align-items: center;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 15px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
}
.option:hover {
    border-color: var(--accent-red);
    background: rgba(220, 38, 38, 0.05);
}
.option input {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    accent-color: var(--accent-red);
}
.option input:checked + span {
    font-weight: 700;
}
.survey-input {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text-primary);
    font-size: 15px;
    width: 200px;
    display: block;
    margin: 0 auto;
    text-align: center;
    transition: all 0.2s;
}
.survey-input:focus {
    outline: none;
    border-color: var(--accent-red);
}
.inline-fields {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 12px;
    text-align: center;
    font-size: 15px;
}
.btn-submit-survey {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 56px auto 0;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent-red), var(--accent-red-light));
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
}
.btn-submit-survey:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
}
.btn-submit-survey:disabled {
    background: var(--text-muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
.report-container {
    background: var(--card-bg);
    padding: 48px;
    border-radius: 20px;
    margin-top: 32px;
    display: none;
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}
.report-title {
    font-size: 32px;
    text-align: center;
    color: var(--accent-red);
    margin-bottom: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
}
.risk-level {
    text-align: center;
    font-size: 22px;
    margin: 24px 0;
    padding: 24px;
    background: rgba(220, 38, 38, 0.1);
    border-radius: 14px;
    font-weight: 700;
    border: 1px solid rgba(220, 38, 38, 0.2);
}
.radar-container {
    width: 100%;
    max-width: 550px;
    margin: 32px auto;
    padding: 24px;
    background: var(--card-bg-hover);
    border-radius: 16px;
    border: 1px solid var(--border-color);
}
.block {
    margin: 32px 0;
    line-height: 1.8;
}
.block h3 {
    color: var(--accent-red);
    font-size: 20px;
    margin-bottom: 16px;
    font-weight: 800;
}
.block p {
    font-size: 16px;
    color: var(--text-secondary);
}
.high-disease {
    color: #f59e0b;
    font-weight: bold;
}
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

    <div class="header">
        <div class="back-home">
            <button onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
        </div>
    </div>

    <div class="survey-wrapper">
        <!-- 保留原有的HTML内容 -->
    </div>
</body>
</html>
