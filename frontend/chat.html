<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI交互</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root {
    --body-bg: #0f1117;
    --card-bg: #1a1d29;
    --text-primary: #ffffff;
    --text-secondary: #a7b0c4;
    --border-color: #2d3142;
    --accent-red: #dc2626;
    --ai-msg-bg: #1a1d29;
    --header-bg: #0f1117;
    --footer-bg: #0f1117;
    --input-bg: #222533;
}
html[data-theme="light"] {
    --body-bg: #f8fafc;
    --card-bg: #ffffff;
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --border-color: #e2e8f0;
    --accent-red: #dc2626;
    --ai-msg-bg: #f1f5f9;
    --header-bg: #f8fafc;
    --footer-bg: #f8fafc;
    --input-bg: #ffffff;
}
body{
    background: var(--body-bg);
    color: var(--text-primary);
    height: 100vh;
    display:flex;
    flex-direction:column;
    transition: all 0.3s ease;
}
.logo-box{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:20px 0}
.logo{width:130px;height:130px;border-radius:50%;object-fit:cover;animation:beat 1.8s infinite ease-in-out;border:2px solid var(--accent-red)}
@keyframes beat{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.chat-header{height:65px;background:var(--header-bg);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:20px;border-bottom:1px solid var(--accent-red)}
.chat-container{flex:1;overflow-y:auto;padding:25px 20px 130px;max-width:800px;margin:0 auto;width:100%}
.chat-container::-webkit-scrollbar{width:5px}
.chat-container::-webkit-scrollbar-thumb{background:var(--accent-red);border-radius:10px}
.msg-item{margin-bottom:18px;display:flex}
.user-msg{justify-content:flex-end}
.ai-msg{justify-content:flex-start}
.msg-bubble{max-width:78%;padding:14px 18px;border-radius:18px;font-size:15px;line-height:1.6}
.user-msg .msg-bubble{background:var(--accent-red);color:#fff;border-bottom-right-radius:6px}
.ai-msg .msg-bubble{
    background:var(--ai-msg-bg);
    color:var(--text-primary);
    border-bottom-left-radius:6px;
}
.chat-footer{position:fixed;bottom:0;left:0;right:0;background:var(--footer-bg);padding:18px 25px;border-top:1px solid var(--accent-red)}
.input-box{max-width:800px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
textarea{
    flex:1;
    background:var(--input-bg);
    border:1px solid var(--accent-red);
    border-radius:18px;
    padding:16px 18px;
    color:var(--text-primary);
    font-size:16px;
    resize:none;
    height:70px;
    outline:none;
}
button{background:var(--accent-red);color:#fff;border:none;border-radius:16px;padding:0 22px;height:70px;cursor:pointer;font-size:16px}
button:hover{background:#cc0000}
.back-btn{background:transparent;color:var(--accent-red);border:1px solid var(--accent-red);border-radius:8px;padding:6px 12px;height:auto;cursor:pointer}
.back-btn:hover{background:var(--accent-red);color:white}
.theme-toggle{margin-left:10px;background:var(--card-bg);color:var(--text-primary);border:1px solid var(--border-color);border-radius:10px;padding:8px 12px;height:auto;cursor:pointer;display:flex;align-items:center;gap:6px}
.theme-toggle:hover{background:var(--border-color)}
</style>
</head>
<body>

<div class="logo-box">
<img class="logo" src="logo.png">
</div>

<div class="chat-header">
<div>
<button class="back-btn" onclick="location.href='index.html'">退出到首页</button>
<button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
</div>
<div>心血管智能助手</div>
</div>

<div class="chat-container" id="chatBox"></div>

<div class="chat-footer">
<div class="input-box">
<textarea id="inputText" placeholder="发送消息..."></textarea>
<button onclick="send()">发送</button>
</div>
</div>

<script src="js/main.js"></script>
<script>
const chatBox=document.getElementById('chatBox')
const input=document.getElementById('inputText')
let messages = []
let isLoading = false

function initTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('themeIcon');
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    if (saved === 'light') {
        icon.classList.replace('fa-moon', 'fa-sun');
    } else {
        icon.classList.replace('fa-sun', 'fa-moon');
    }
}

function addMsg(cls,text){
    const div=document.createElement('div')
    div.className='msg-item '+cls
    div.innerHTML=`<div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`
    chatBox.appendChild(div)
    chatBox.scrollTop=chatBox.scrollHeight
}

async function send(){
    if(isLoading) return
    const val=input.value.trim()
    if(!val)return
    
    const username = getCurrentUser()
    if (!username) {
        showToast('请先登录', 'error')
        window.location.href = 'login.html'
        return
    }
    
    addMsg('user-msg',val)
    input.value = ''
    
    messages.push({ role: 'user', content: val })
    isLoading = true
    
    const loadingMsgId = 'loading-' + Date.now()
    const loadingDiv = document.createElement('div')
    loadingDiv.className = 'msg-item ai-msg'
    loadingDiv.id = loadingMsgId
    loadingDiv.innerHTML = `<div class="msg-bubble">正在思考...</div>`
    chatBox.appendChild(loadingDiv)
    chatBox.scrollTop = chatBox.scrollHeight
    
    try {
        const result = await aiChat(messages, username)
        
        if(result.code === 200 && result.data) {
            const aiResponse = result.data.response || result.data.message || result.data || '抱歉，我暂时无法回答'
            loadingDiv.remove()
            addMsg('ai-msg', aiResponse)
            messages.push({ role: 'assistant', content: aiResponse })
        } else {
            loadingDiv.remove()
            addMsg('ai-msg', '抱歉，出现了一些问题，请稍后再试')
        }
    } catch (error) {
        console.error(error)
        loadingDiv.remove()
        addMsg('ai-msg', '抱歉，连接失败，请稍后再试')
        showToast(error.message || '连接失败', 'error')
    } finally {
        isLoading = false
    }
}

window.onload = function() {
    initTheme();
};
</script>
</body>
</html>
